<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="접속할 때마다 새로운 미친 고양이를 만나고 사진별 방명록을 남겨보세요."
    />
    <!-- SOCIAL_META_START -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="미친고양이.zip" />
    <meta property="og:title" content="오늘의 미친 고양이" />
    <meta
      property="og:description"
      content="접속할 때마다 새로운 미친 고양이를 만나보세요."
    />
    <meta property="og:url" content="https://random-crazycat.web.app/" />
    <meta
      property="og:image"
      content="https://random-crazycat.web.app/cats/box-overflow.webp"
    />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:width" content="960" />
    <meta property="og:image:height" content="1200" />
    <meta property="og:image:alt" content="작은 상자를 가득 채운 회색 줄무늬 고양이" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="오늘의 미친 고양이" />
    <meta
      name="twitter:description"
      content="접속할 때마다 새로운 미친 고양이를 만나보세요."
    />
    <meta
      name="twitter:image"
      content="https://random-crazycat.web.app/cats/box-overflow.webp"
    />
    <!-- SOCIAL_META_END -->
    <meta name="theme-color" content="#ff5938" />
    <title>오늘의 미친 고양이</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="/" aria-label="오늘의 미친 고양이 홈">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <path d="M11 20 8 8l12 7h8l12-7-3 12a17 17 0 1 1-26 0Z" />
              <path d="M17 27h.01M31 27h.01M20 34c2.8 2 5.2 2 8 0" />
            </svg>
          </span>
          <span>미친고양이.zip</span>
        </a>
        <div class="header-actions">
          <span id="auth-status" class="auth-status">관리자 전용</span>
          <button id="admin-auth" class="admin-auth" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21.35 12.2c0-.7-.06-1.2-.2-1.73H12v3.32h5.37a4.6 4.6 0 0 1-2 3v2.18h2.87c1.94-1.8 3.1-4.47 3.1-6.77Z" />
              <path d="M12 21.7c2.62 0 4.82-.86 6.43-2.34l-3.05-2.57c-.84.57-1.92.9-3.38.9-2.53 0-4.68-1.71-5.45-4.01H3.4v2.24A9.72 9.72 0 0 0 12 21.7Z" />
              <path d="M6.55 13.68A5.85 5.85 0 0 1 6.24 12c0-.59.1-1.15.3-1.68V8.08H3.4A9.7 9.7 0 0 0 2.3 12c0 1.41.38 2.75 1.1 3.92l3.15-2.24Z" />
              <path d="M12 6.3c1.57 0 2.96.54 4.06 1.58l2.44-2.44A9.2 9.2 0 0 0 12 2.3a9.72 9.72 0 0 0-8.6 5.78l3.15 2.24C7.32 8.01 9.47 6.3 12 6.3Z" />
            </svg>
            <span>관리자 로그인</span>
          </button>
        </div>
      </header>

      <main id="main-content" class="main-layout" tabindex="-1">
        <section class="cat-stage" aria-labelledby="cat-title">
          <div class="stage-intro">
            <div>
              <p class="kicker">TODAY'S CHAOS</p>
              <h1 id="cat-title">고양이 불러오는 중…</h1>
            </div>
            <span id="cat-number" class="cat-number" aria-label="현재 고양이 번호">#?</span>
          </div>

          <figure class="photo-card">
            <div class="tape tape-top" aria-hidden="true"></div>
            <div class="photo-frame">
              <img
                id="cat-photo"
                alt=""
                width="960"
                height="1200"
                decoding="async"
                fetchpriority="high"
              />
              <span id="cat-sticker" class="photo-sticker">상태 확인 중</span>
            </div>
            <figcaption id="cat-caption">잠시만 기다려주세요.</figcaption>
          </figure>

          <div class="cat-actions">
            <button id="next-cat" class="button button-primary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6" />
              </svg>
              다른 미친 고양이
            </button>
            <button id="share-cat" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="18" cy="5" r="3" />
                <circle cx="6" cy="12" r="3" />
                <circle cx="18" cy="19" r="3" />
                <path d="m8.6 10.5 6.8-4M8.6 13.5l6.8 4" />
              </svg>
              이 냥이 공유
            </button>
            <button id="chaos-game-start" class="button button-chaos" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 17h8M9 17v3h6v-3M10 13h4M8 13l1-6h6l1 6M12 3v2M5.6 5.6l1.5 1.5M18.4 5.6l-1.5 1.5M4 11H2M22 11h-2" />
              </svg>
              10초 냥이 체포 작전
            </button>
          </div>
          <p id="share-feedback" class="action-feedback" aria-live="polite"></p>
        </section>

        <aside class="guestbook" aria-labelledby="guestbook-title">
          <div class="guestbook-heading">
            <div>
              <p class="kicker">PHOTO GUESTBOOK</p>
              <h2 id="guestbook-title">이 냥이 방명록</h2>
            </div>
            <span id="comment-count" class="count-badge" aria-label="댓글 수">0</span>
          </div>

          <form id="comment-form" class="comment-form">
            <div class="field">
              <label for="nickname">닉네임 <span>(선택)</span></label>
              <input
                id="nickname"
                name="nickname"
                type="text"
                maxlength="20"
                autocomplete="nickname"
                placeholder="익명 집사"
              />
            </div>
            <div class="field">
              <div class="label-row">
                <label for="message">한마디 <span>(필수)</span></label>
                <span id="message-count">0 / 200</span>
              </div>
              <textarea
                id="message"
                name="message"
                maxlength="200"
                rows="3"
                required
                placeholder="이 고양이에게 할 말을 남겨주세요"
              ></textarea>
            </div>
            <button class="button button-submit" type="submit">
              방명록 남기기
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m5 12 4 4L19 6" />
              </svg>
            </button>
            <p id="form-feedback" class="form-feedback" aria-live="polite"></p>
          </form>

          <div class="comments-header">
            <h3>남겨진 흔적</h3>
            <span>최신순</span>
          </div>
          <p id="guestbook-feedback" class="guestbook-feedback" aria-live="polite"></p>
          <div id="comments" class="comments" aria-live="polite" aria-busy="true">
            <div class="comments-state">
              <span class="loader" aria-hidden="true"></span>
              <p>방명록을 펼치는 중…</p>
            </div>
          </div>
        </aside>
      </main>

      <footer>
        <p>고양이는 진지합니다. 인간만 웃고 있을 뿐.</p>
        <span id="cat-total">16마리의 혼돈 보유 중</span>
      </footer>
    </div>

    <section
      id="chaos-game"
      class="chaos-game"
      role="dialog"
      aria-modal="true"
      aria-labelledby="chaos-game-title"
      hidden
    >
      <header class="chaos-game-hud">
        <div>
          <p>CAT EMERGENCY</p>
          <h2 id="chaos-game-title">고양이 긴급 체포 작전</h2>
        </div>
        <div class="chaos-game-stats" aria-live="polite">
          <span>남은 시간 <strong id="chaos-time">10</strong>초</span>
          <span>검거 <strong id="chaos-score">0</strong>마리</span>
        </div>
        <button id="chaos-game-close" class="chaos-game-close" type="button" aria-label="체포 작전 종료">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6 6 12 12M18 6 6 18" />
          </svg>
        </button>
      </header>
      <div id="chaos-targets" class="chaos-targets" aria-label="탈주한 고양이들"></div>
      <div id="chaos-result" class="chaos-result" hidden>
        <p class="kicker">MISSION REPORT</p>
        <h2 id="chaos-rank">집사 판정 중…</h2>
        <p id="chaos-summary"></p>
        <div class="chaos-result-actions">
          <button id="chaos-replay" class="button button-primary" type="button">다시 체포하기</button>
          <button id="chaos-result-close" class="button button-secondary" type="button">현장 복귀</button>
        </div>
      </div>
    </section>

    <canvas id="fireworks-easter-egg" class="fireworks-easter-egg" aria-hidden="true"></canvas>
    <div id="fireworks-easter-trigger" class="fireworks-easter-trigger" aria-hidden="true"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
